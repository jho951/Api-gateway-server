name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
      - "refactor/**"
      - "chore/**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Compile Java
        run: ./gradlew --no-daemon clean compileJava

      - name: Build distribution
        run: ./gradlew --no-daemon installDist

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t api-gateway:ci .
