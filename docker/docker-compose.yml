services:
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: api-gateway-${APP_ENV:-dev}
    ports:
      - "8080:8080"
    env_file:
      - ../env/${APP_ENV:-dev}.env
    environment:
      APP_ENV: ${APP_ENV:-dev}
      AUTH_SERVICE_URL: http://host.docker.internal:8081
      USER_SERVICE_URL: http://host.docker.internal:8082
      BLOCK_SERVICE_URL: http://host.docker.internal:8083
      PERMISSION_SERVICE_URL: http://host.docker.internal:8084
      AUTH_VALIDATE_URL: http://host.docker.internal:8081/auth/internal/session/validate
      PERMISSION_ADMIN_VERIFY_URL: http://host.docker.internal:8084/permissions/internal/admin/verify
    extra_hosts:
      - "host.docker.internal:host-gateway"
