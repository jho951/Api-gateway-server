name: gateway-service

services:
  gateway-service:
    image: ${GATEWAY_IMAGE:-ghcr.io/jho951/gateway-service:latest}
    networks:
      service-shared:
        aliases:
          - gateway-service
          - gateway

networks:
  service-shared:
    external: true
    name: ${SERVICE_SHARED_NETWORK:-${BACKEND_SHARED_NETWORK:-${MSA_SHARED_NETWORK:-service-backbone-shared}}}
